version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dns-bot-postgres
    environment:
      POSTGRES_USER: dnsbot
      POSTGRES_PASSWORD: dnsbot123
      POSTGRES_DB: dnsbot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnsbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dns-bot-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dns-bot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dns-bot-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dns-bot-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://dnsbot:dnsbot123@postgres:5432/dnsbot_db
      REDIS_URL: redis://redis:6379/0
      DEBUG: "False"
      LOG_LEVEL: INFO
      HOST: 0.0.0.0
      PORT: 8000
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN}
      JUDGE0_API_KEY: ${JUDGE0_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE: ${TWILIO_PHONE}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - dns-bot-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dns-bot-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - dns-bot-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  dns-bot-network:
    driver: bridge
